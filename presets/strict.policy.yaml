# OriginFence preset: strict
# Stricter public-repo rollout with stronger soft-signal review. Add package globs under provenance.require_for once your dependency set has reliable attestations.
# Start with explicit package globs under provenance.require_for instead of requiring provenance for every public package.

version: 1
sources:
  allow:
    - registry.npmjs.org
    - npmjs.org
    - pypi.org
    - files.pythonhosted.org
  deny_direct_urls: true
provenance:
  npm:
    require_for: []
    missing_action: block
  pypi:
    require_for: []
    missing_action: block
malicious_packages:
  action: block
soft_signals:
  recent_package_age_days: 7
  maintainer_set_change: review
  publisher_identity_drift: review
waivers:
  file: .originfence/waivers.yaml
